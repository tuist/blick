[agent]
kind = "opencode"
model = "fireworks-ai/accounts/fireworks/models/kimi-k2p5"

[defaults]
base = "origin/main"
max_concurrency = 2

[[skills]]
name = "rust-best-practices"
source = "apollographql/skills"
subpath = "skills/rust-best-practices"

[[reviews]]
name = "default"
skills = ["rust-best-practices"]
prompt = """
Focus on Rust correctness, async/await soundness, and public-API surface changes.
Skip style nits since clippy and rustfmt cover those.

Error handling: only flag concrete bugs (unhandled Results, panics in async, broken error chains).
Do NOT flag stylistic asymmetries or request defensive fallbacks for theoretical edge cases.

Test coverage: before suggesting a test is missing, search for existing tests that may already cover the case.
"""

[learn]
lookback_days = 7
min_signal = 3
team_reviewers = ["tuist/engineering"]
labels = ["blick-learn"]
base = "main"
draft = true
