name: Blick Review

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  review:
    name: Review
    # Only run on PRs from branches in this repo. Forked PRs don't have
    # access to repo secrets and shouldn't be exposed to an LLM agent that
    # can read the codebase.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Build blick from source
        run: cargo build --release --locked

      - name: Run blick review
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FIREWORKS_API_KEY:-}" ]; then
            echo "FIREWORKS_API_KEY is not set; add it to repo secrets so opencode can authenticate against Fireworks." >&2
            exit 1
          fi
          ./target/release/blick review \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            --json --stream

      - name: Publish review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./target/release/blick publish

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blick-runs
          path: .blick/runs/
          if-no-files-found: ignore
