name: Blick Review

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  review:
    name: Review
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Build blick from source
        run: cargo build --release --locked

      - name: Run blick review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY is not set — add it to repo secrets so opencode can authenticate." >&2
            exit 1
          fi
          base="origin/${{ github.event.pull_request.base.ref }}"
          ./target/release/blick review --base "$base" --json --stream

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blick-runs
          path: .blick/runs/
          if-no-files-found: ignore

      - name: Post per-review check runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -e .blick/runs/latest ]; then
            echo "No run output to post; skipping." >&2
            exit 0
          fi
          ./target/release/blick render --format=check-run --head-sha="$HEAD_SHA" |
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              printf '%s' "$line" |
                gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
                  -X POST -H "Accept: application/vnd.github+json" --input -
            done

      - name: Post resolvable PR review
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -e .blick/runs/latest ]; then
            echo "No run output to post; skipping." >&2
            exit 0
          fi
          ./target/release/blick render --format=github-review --head-sha="$HEAD_SHA" \
            > review.json
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
            -X POST -H "Accept: application/vnd.github+json" --input review.json
